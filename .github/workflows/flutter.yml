name: Flutter Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # manual trigger from GitHub Actions tab

jobs:

  # ── ANDROID ARM32 ──────────────────────────────────────────────────────────
  build-android:
    name: Android ARM32
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.14.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (ARM32 only)
        run: flutter build apk --target-platform android-arm --split-per-abi

      - name: Upload ARM32 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-arm32-apk
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

  # ── WINDOWS x64 ────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.14.4'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Zip Windows build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath windows-x64.zip
        shell: pwsh

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: windows-x64.zip

  # ── WEB ────────────────────────────────────────────────────────────────────
  build-web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.14.4'
          channel: 'stable'

      - name: Enable web
        run: flutter config --enable-web

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/















